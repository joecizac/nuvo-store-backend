services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: nuvo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nuvo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: nuvo-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
